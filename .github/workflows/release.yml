name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            npm_pkg: pick-cli-darwin-arm64
            bin: pick
          - target: x86_64-apple-darwin
            os: macos-latest
            npm_pkg: pick-cli-darwin-x64
            bin: pick
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm_pkg: pick-cli-linux-x64
            bin: pick
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            npm_pkg: pick-cli-linux-arm64
            bin: pick
            cross: true
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            npm_pkg: pick-cli-win32-x64
            bin: pick.exe
            cross: true

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml && rm -f Cargo.toml.bak
          echo "Building version $VERSION"

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Stage binary for npm
        run: |
          mkdir -p npm/${{ matrix.npm_pkg }}/bin
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} npm/${{ matrix.npm_pkg }}/bin/${{ matrix.bin }}
          chmod +x npm/${{ matrix.npm_pkg }}/bin/${{ matrix.bin }}

      - name: Create release archive
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if [ "${{ matrix.bin }}" = "pick.exe" ]; then
            ARCHIVE="pick-v${VERSION}-${{ matrix.target }}.zip"
            cd target/${{ matrix.target }}/release
            zip "../../../${ARCHIVE}" ${{ matrix.bin }}
            cd ../../..
          else
            ARCHIVE="pick-v${VERSION}-${{ matrix.target }}.tar.gz"
            tar -czf "${ARCHIVE}" -C target/${{ matrix.target }}/release ${{ matrix.bin }}
          fi
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload binary archive
        uses: actions/upload-artifact@v7
        with:
          name: archive-${{ matrix.target }}
          path: pick-v*

      - name: Upload npm artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.npm_pkg }}
          path: npm/${{ matrix.npm_pkg }}

  # ── 1. npm + GitHub Release (existing) ──────────────────────────────
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Sync versions from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Publishing version $VERSION"

          for pkg_dir in npm/pick-cli*/; do
            sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" "$pkg_dir/package.json"
          done

          sed -i "s/\"@aryanbhosale\/pick-\([^\"]*\)\": \"[^\"]*\"/\"@aryanbhosale\/pick-\1\": \"${VERSION}\"/g" npm/pick-cli/package.json

      - name: Stage binaries into npm packages
        run: |
          for artifact_dir in artifacts/pick-cli-*/; do
            pkg_name=$(basename "$artifact_dir")
            mkdir -p "npm/$pkg_name/bin"
            cp -r "$artifact_dir"/bin/* "npm/$pkg_name/bin/"
            chmod +x npm/$pkg_name/bin/*
          done

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg_dir in npm/pick-cli-darwin-arm64 npm/pick-cli-darwin-x64 npm/pick-cli-linux-x64 npm/pick-cli-linux-arm64 npm/pick-cli-win32-x64; do
            echo "Publishing $(basename $pkg_dir)..."
            cd "$pkg_dir"
            npm publish --access public --provenance || echo "  (skipped, may already exist)"
            cd "$GITHUB_WORKSPACE"
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/pick-cli
          npm publish --access public --provenance

      - name: Download binary archives
        uses: actions/download-artifact@v8
        with:
          pattern: archive-*
          path: archives
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: archives/*

  # ── 2. Cargo (crates.io) ────────────────────────────────────────────
  publish-cargo:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish --allow-dirty

  # ── 3. Docker (ghcr.io) ─────────────────────────────────────────────
  publish-docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/aryanbhosale/pick:${{ env.VERSION }}
            ghcr.io/aryanbhosale/pick:latest

  # ── 4. Homebrew tap ─────────────────────────────────────────────────
  publish-homebrew:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download binary archives
        uses: actions/download-artifact@v8
        with:
          pattern: archive-*
          path: archives
          merge-multiple: true

      - name: Generate Homebrew formula
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          SHA_DARWIN_ARM64=$(sha256sum archives/pick-v${VERSION}-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_DARWIN_X64=$(sha256sum archives/pick-v${VERSION}-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_LINUX_X64=$(sha256sum archives/pick-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          SHA_LINUX_ARM64=$(sha256sum archives/pick-v${VERSION}-aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)

          sed \
            -e "s/\\\$VERSION\\\$/${VERSION}/g" \
            -e "s/\\\$SHA256_DARWIN_ARM64\\\$/${SHA_DARWIN_ARM64}/g" \
            -e "s/\\\$SHA256_DARWIN_X64\\\$/${SHA_DARWIN_X64}/g" \
            -e "s/\\\$SHA256_LINUX_X64\\\$/${SHA_LINUX_X64}/g" \
            -e "s/\\\$SHA256_LINUX_ARM64\\\$/${SHA_LINUX_ARM64}/g" \
            dist/homebrew/pick.rb > pick.rb

          echo "Generated formula:"
          cat pick.rb

      - name: Push to Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set, skipping tap update"
            exit 0
          fi
          git clone https://x-access-token:${TAP_TOKEN}@github.com/aryanbhosale/homebrew-pick.git tap
          mkdir -p tap/Formula
          cp pick.rb tap/Formula/pick.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/pick.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update pick to ${GITHUB_REF_NAME#v}"
          git push

  # ── 5. Snap Store ───────────────────────────────────────────────────
  publish-snap:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version: git/version: '${VERSION}'/" snap/snapcraft.yaml

      - name: Build snap
        uses: snapcore/action-build@v1
        id: build

      - name: Publish to Snap Store
        continue-on-error: true
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: |
          sudo snap install snapcraft --classic
          snapcraft upload --release=stable ${{ steps.build.outputs.snap }}

  # ── 6. Chocolatey ───────────────────────────────────────────────────
  publish-choco:
    needs: publish
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download Windows archive
        uses: actions/download-artifact@v8
        with:
          name: archive-x86_64-pc-windows-gnu
          path: archives

      - name: Build and push Chocolatey package
        continue-on-error: true
        shell: pwsh
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $archive = Get-ChildItem archives/*.zip | Select-Object -First 1
          $checksum = (Get-FileHash $archive -Algorithm SHA256).Hash

          # Patch nuspec version
          $nuspec = Get-Content choco/pick.nuspec -Raw
          $nuspec = $nuspec -replace '\$VERSION\$', $version
          Set-Content choco/pick.nuspec $nuspec

          # Embed checksum into install script
          $install = Get-Content choco/tools/chocolateyinstall.ps1 -Raw
          $install = $install -replace '\$env:CHOCO_CHECKSUM', "'$checksum'"
          Set-Content choco/tools/chocolateyinstall.ps1 $install

          cd choco
          choco pack
          if ($env:CHOCO_API_KEY) {
            choco push pick.$version.nupkg --source https://push.chocolatey.org/ --api-key $env:CHOCO_API_KEY
          } else {
            Write-Warning "CHOCO_API_KEY not set, skipping push"
          }

  # ── 7. WinGet ───────────────────────────────────────────────────────
  publish-winget:
    needs: publish
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download Windows archive
        uses: actions/download-artifact@v8
        with:
          name: archive-x86_64-pc-windows-gnu
          path: archives

      - name: Submit to WinGet
        continue-on-error: true
        shell: pwsh
        env:
          WINGET_GITHUB_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
        run: |
          if (-not $env:WINGET_GITHUB_TOKEN) {
            Write-Warning "WINGET_GITHUB_TOKEN not set, skipping WinGet submission"
            exit 0
          }
          $version = "${{ github.ref_name }}".TrimStart("v")
          $url = "https://github.com/aryanbhosale/pick/releases/download/${{ github.ref_name }}/pick-v${version}-x86_64-pc-windows-gnu.zip"

          # Install wingetcreate
          Invoke-WebRequest -Uri https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

          # Update existing manifest and submit PR to winget-pkgs
          .\wingetcreate.exe update aryanbhosale.pick `
            --version $version `
            --urls $url `
            --token $env:WINGET_GITHUB_TOKEN `
            --submit
